# Nginx reverse proxy configuration for tg-paid-community-bot
#
# Place in /etc/nginx/sites-available/bot (Debian/Ubuntu)
#   sudo ln -s /etc/nginx/sites-available/bot /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# For HTTPS via Let's Encrypt:
#   sudo apt install certbot python3-certbot-nginx -y
#   sudo certbot --nginx -d your-domain.com

server {
    listen 80;
    server_name your-domain.com;

    # Increase body size for file uploads (e.g. future expansion)
    client_max_body_size 5m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (not currently used, future-proof)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeout settings
        proxy_read_timeout 60s;
        proxy_connect_timeout 3s;
    }

    # Deny access to .env, .db, and other sensitive files
    location ~ /\.(env|git) { deny all; }
    location ~ \.db$ { deny all; }

    # Access logs
    access_log /var/log/nginx/bot-access.log;
    error_log /var/log/nginx/bot-error.log;
}
